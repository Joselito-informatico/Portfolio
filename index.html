<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portafolio de José Le Blanc — Ingeniero Civil en Computación e Informática. Full-Stack Developer con stack MERN, React y Power BI."
    />
    <title>José Le Blanc — Full-Stack Developer</title>

    <!-- Preconnect corregido: gstatic necesita crossorigin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fuentes no bloqueantes: media=print + onload trick -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <!-- Fallback para JS desactivado -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Open Graph -->
<meta property="og:title" content="José Le Blanc — Full-Stack Developer" />
<meta property="og:description" content="Ingeniero Civil en Computación e Informática. Stack MERN, React, Power BI. Disponible para trabajar." />
<meta property="og:image" content="https://portfolio-three-mauve-g2pw10q0al.vercel.app/og-image.png" />
<meta property="og:url" content="https://portfolio-three-mauve-g2pw10q0al.vercel.app" />
<meta property="og:type" content="website" />

<!-- Twitter/X Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://portfolio-three-mauve-g2pw10q0al.vercel.app/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
